<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text Scramble</title>
    <style>
      :root {
        color-scheme: light dark;
        --paper: var(--figma-color-bg, #f7f4ee);
        --paper-raised: var(--figma-color-bg-secondary, #fffdf8);
        --ink: var(--figma-color-text, #251a2c);
        --muted: var(--figma-color-text-secondary, #716875);
        --line: var(--figma-color-border, rgba(37, 26, 44, 0.13));
        --soft: var(--figma-color-bg-tertiary, rgba(70, 48, 78, 0.07));
        --coral: #ff6f61;
        --coral-dark: #d94f57;
        --plum: #2e1d38;
        --cream: #fff4dd;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at 4% 0%, color-mix(in srgb, var(--coral) 14%, transparent) 0, transparent 32%),
          var(--paper);
        color: var(--ink);
        font: 12px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .shell { padding: 18px; }

      .frame {
        position: relative;
        padding: 18px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: color-mix(in srgb, var(--paper-raised) 93%, transparent);
        box-shadow: 0 14px 40px rgba(30, 18, 36, 0.1), inset 0 0 0 3px color-mix(in srgb, var(--paper) 84%, transparent);
      }

      .frame::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 92px;
        height: 92px;
        pointer-events: none;
        background: radial-gradient(circle at 78% 18%, color-mix(in srgb, var(--coral) 18%, transparent), transparent 58%);
      }

      header { display: grid; grid-template-columns: 54px 1fr; gap: 13px; align-items: center; }

      .mark {
        position: relative;
        width: 54px;
        height: 54px;
        border-radius: 15px;
        background: var(--plum);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08), 0 8px 18px rgba(32, 16, 40, 0.18);
      }

      .sheet {
        position: absolute;
        inset: 10px 12px 9px 12px;
        border-radius: 7px 8px 8px 9px;
        background: var(--cream);
        transform: rotate(-3deg);
      }

      .sheet::before,
      .sheet::after {
        content: "";
        position: absolute;
        left: 7px;
        height: 4px;
        border-radius: 99px;
        background: #625169;
      }

      .sheet::before { top: 9px; width: 22px; box-shadow: 0 9px 0 #9f939e, 0 18px 0 #625169; }
      .sheet::after { right: 7px; bottom: 4px; background: var(--coral); }

      .spark {
        position: absolute;
        right: 5px;
        top: 18px;
        width: 12px;
        height: 12px;
        background: var(--coral);
        clip-path: polygon(50% 0, 62% 38%, 100% 50%, 62% 62%, 50% 100%, 38% 62%, 0 50%, 38% 38%);
      }

      .eyebrow {
        margin: 0 0 2px;
        color: var(--coral-dark);
        font-size: 9px;
        font-weight: 750;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        font-size: 25px;
        line-height: 1.05;
        letter-spacing: -0.025em;
      }

      .lede { margin: 9px 0 0; color: var(--muted); font-size: 11px; }

      .divider { height: 1px; margin: 17px 0; background: var(--line); }

      .section-label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 9px;
        font-weight: 720;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .scope-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

      .scope-option { position: relative; }
      .scope-option input { position: absolute; opacity: 0; pointer-events: none; }

      .scope-option label {
        display: block;
        min-height: 70px;
        padding: 11px;
        cursor: pointer;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--soft);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
      }

      .scope-option label:hover { transform: translateY(-1px); border-color: color-mix(in srgb, var(--coral) 55%, var(--line)); }
      .scope-option input:focus-visible + label { outline: 2px solid var(--coral); outline-offset: 2px; }
      .scope-option input:checked + label {
        border-color: color-mix(in srgb, var(--coral) 72%, var(--line));
        background: color-mix(in srgb, var(--coral) 8%, var(--paper-raised));
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--coral) 18%, transparent);
      }

      .scope-title { display: block; margin-bottom: 3px; font-size: 11px; font-weight: 700; }
      .scope-copy { display: block; color: var(--muted); font-size: 10px; line-height: 1.35; }

      .summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 38px;
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 10px;
        background: color-mix(in srgb, var(--plum) 5%, var(--soft));
        color: var(--muted);
      }

      .summary strong { color: var(--ink); font-variant-numeric: tabular-nums; }

      .option-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
      .option-title { display: block; font-weight: 700; }
      .option-copy { display: block; margin-top: 2px; color: var(--muted); font-size: 10px; }

      .switch { position: relative; width: 36px; height: 22px; flex: 0 0 auto; }
      .switch input { position: absolute; opacity: 0; }
      .track {
        position: absolute;
        inset: 0;
        cursor: pointer;
        border: 1px solid var(--line);
        border-radius: 99px;
        background: var(--soft);
        transition: background 160ms ease, border-color 160ms ease;
      }
      .track::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--paper-raised);
        box-shadow: 0 1px 4px rgba(25, 15, 31, 0.22);
        transition: transform 180ms cubic-bezier(.2,.8,.2,1);
      }
      .switch input:checked + .track { border-color: var(--coral); background: var(--coral); }
      .switch input:checked + .track::after { transform: translateX(14px); }
      .switch input:focus-visible + .track { outline: 2px solid var(--coral); outline-offset: 2px; }

      .action {
        position: relative;
        width: 100%;
        margin-top: 17px;
        padding: 12px 16px;
        overflow: hidden;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--coral), #f45e69);
        color: #26172d;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.01em;
        box-shadow: 0 8px 18px rgba(217, 79, 87, 0.24), inset 0 1px 0 rgba(255,255,255,0.35);
        transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
      }
      .action:hover { transform: translateY(-1px); filter: saturate(1.04); box-shadow: 0 10px 22px rgba(217, 79, 87, 0.3); }
      .action:active { transform: translateY(0) scale(0.995); }
      .action:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
      .action:disabled { cursor: wait; filter: saturate(0.55); opacity: 0.74; transform: none; }

      .note { margin: 11px 2px 0; color: var(--muted); font-size: 9.5px; text-align: center; }
      .note strong { color: var(--ink); font-weight: 700; }

      .status {
        min-height: 32px;
        margin-top: 10px;
        padding: 8px 10px;
        border: 1px solid transparent;
        border-radius: 9px;
        color: var(--muted);
        text-align: center;
        opacity: 0;
        transform: translateY(3px);
        transition: opacity 160ms ease, transform 160ms ease, background 160ms ease;
      }
      .status.visible { opacity: 1; transform: translateY(0); }
      .status.success { color: var(--ink); background: color-mix(in srgb, #55a773 12%, var(--soft)); }
      .status.error { color: var(--ink); background: color-mix(in srgb, var(--coral) 12%, var(--soft)); }

      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="frame">
        <header>
          <div class="mark" aria-hidden="true"><div class="sheet"></div><div class="spark"></div></div>
          <div>
            <p class="eyebrow">Private · on device</p>
            <h1>Text Scramble</h1>
            <p class="lede">Invented copy that keeps the composition alive.</p>
          </div>
        </header>

        <div class="divider"></div>

        <span class="section-label">Scramble</span>
        <div class="scope-grid" role="radiogroup" aria-label="Scramble scope">
          <div class="scope-option">
            <input id="selection" name="scope" type="radio" value="selection" checked />
            <label for="selection">
              <span class="scope-title">Selection</span>
              <span class="scope-copy">Text, frames, groups, or components.</span>
            </label>
          </div>
          <div class="scope-option">
            <input id="page" name="scope" type="radio" value="page" />
            <label for="page">
              <span class="scope-title">Current page</span>
              <span class="scope-copy">Every visible, unlocked text layer.</span>
            </label>
          </div>
        </div>

        <div class="summary" aria-live="polite">
          <span id="summary-copy">Looking for text…</span>
          <strong id="summary-count">—</strong>
        </div>

        <div class="divider"></div>

        <div class="option-row">
          <div>
            <span class="option-title">Scramble numbers</span>
            <span class="option-copy">Keeps digit count and writing system.</span>
          </div>
          <label class="switch" aria-label="Scramble numbers">
            <input id="numbers" type="checkbox" checked />
            <span class="track"></span>
          </label>
        </div>

        <button class="action" id="scramble" type="button">Scramble with soul</button>
        <p class="note"><strong>Formatting stays put.</strong> Fonts, sizes, fills, links, spacing, and line breaks are preserved.</p>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </section>
    </main>

    <script>
      const scopeInputs = Array.from(document.querySelectorAll('input[name="scope"]'));
      const numbers = document.getElementById("numbers");
      const button = document.getElementById("scramble");
      const summaryCopy = document.getElementById("summary-copy");
      const summaryCount = document.getElementById("summary-count");
      const status = document.getElementById("status");

      function post(type) {
        const scope = scopeInputs.find((input) => input.checked)?.value || "selection";
        parent.postMessage({ pluginMessage: { type, scope, scrambleNumbers: numbers.checked } }, "*");
      }

      function showStatus(message, kind = "") {
        status.textContent = message;
        status.className = `status visible ${kind}`;
      }

      function setWorking(working) {
        button.disabled = working;
        button.textContent = working ? "Shaping fresh language…" : "Scramble with soul";
      }

      scopeInputs.forEach((input) => input.addEventListener("change", () => {
        summaryCopy.textContent = "Looking for text…";
        summaryCount.textContent = "—";
        post("preferences");
      }));
      numbers.addEventListener("change", () => post("preferences"));
      button.addEventListener("click", () => post("scramble"));

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "preferences") {
          const scope = document.getElementById(message.preferences.scope);
          if (scope) scope.checked = true;
          numbers.checked = message.preferences.scrambleNumbers;
        }

        if (message.type === "scope-summary") {
          const { layers, characters, skippedLocked, skippedMissingFonts } = message.summary;
          summaryCopy.textContent = layers ? `${characters.toLocaleString()} characters ready` : "No eligible text yet";
          summaryCount.textContent = `${layers} ${layers === 1 ? "layer" : "layers"}`;
          const skipped = skippedLocked + skippedMissingFonts;
          if (skipped) summaryCopy.textContent += ` · ${skipped} skipped`;
        }

        if (message.type === "working") {
          setWorking(true);
          showStatus("Reading styles and shaping a fresh draft…");
        }

        if (message.type === "complete") {
          setWorking(false);
          showStatus(`Done — ${message.layers} ${message.layers === 1 ? "layer" : "layers"}, ${message.characters.toLocaleString()} characters.`, "success");
        }

        if (["empty", "failed", "scope-error"].includes(message.type)) {
          setWorking(false);
          showStatus(message.message, "error");
        }
      };

      post("ready");
    </script>
  </body>
</html>
